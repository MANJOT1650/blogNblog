spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blog_app}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:12345@}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

# Application Secrets and Configurations
jwt.secret=${JWT_SECRET:mySecretKeymySecretKeymySecretKeymySecretKey}
frontend.url=${FRONTEND_URL:http://localhost:3000}
upload.dir=${UPLOAD_DIR:uploads/}
